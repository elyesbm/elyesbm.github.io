<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title id="page-title">تفاصيل الرحلة | Zizou Travel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --glass-bg: rgba(26, 29, 43, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-gold: #D4AF37;
            --accent-yellow: #FFB800;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-width: 100%;
            overflow-x: hidden;
            position: relative;
            -webkit-text-size-adjust: 100%;
        }

        body {
            background-color: #0f172a;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Cairo', sans-serif;
        }

        .details-page-wrapper {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding-bottom: 50px;
        }

        @media (max-width: 1024px) {
            .details-page-wrapper {
                background-attachment: scroll; /* Fix for mobile background shifts */
            }
        }

        .details-page-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.3) 0%, rgba(15, 23, 42, 0.8) 100%);
            z-index: 0;
        }

        .details-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px; /* Force it to have a reference for width if needed, or just keep right */
            display: flex;
            justify-content: flex-end; /* Align to the right for RTL */
            z-index: 100;
        }

        .back-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--accent-gold);
            color: #1a1d2b;
        }

        .hero-section {
            height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .hero-title-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 30px 60px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            text-align: center;
            max-width: 80%;
        }

        .hero-title-card h1 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            margin: 0;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .trip-badge {
            background: var(--accent-gold);
            color: #1a1d2b;
            padding: 4px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            display: inline-block;
        }

        .main-content-grid {
            max-width: 1200px;
            margin: -80px auto 0;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: 30px;
            position: relative;
            z-index: 2;
        }

        .content-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            color: white;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        /* ===== Layout: phone left + desc right ===== */
        .phone-desc-row {
            display: flex;
            align-items: flex-start;
            gap: 35px;
            margin-bottom: 20px;
        }

        .phone-desc-right {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 10px;
        }

        .trip-desc-text {
            font-size: 1.05rem;
            line-height: 1.95;
            color: rgba(255, 255, 255, 0.97);
            white-space: pre-line;
            background: rgba(255, 255, 255, 0.11);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 24px 26px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            margin-bottom: 30px;
        }

        /* Itinerary heading inside right column */
        .itinerary-heading {
            margin: 0 0 25px;
            font-size: 1.6rem;
            border-right: 4px solid var(--accent-gold);
            padding-right: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            color: white;
        }

        /* ===== iPhone Mockup ===== */
        .iphone-showcase {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0 40px;
        }

        .iphone-wrapper {
            position: relative;
            animation: floatPhone 4s ease-in-out infinite;
        }

        @keyframes floatPhone {

            0%,
            100% {
                transform: translateY(0px) rotate(-1.5deg);
            }

            50% {
                transform: translateY(-14px) rotate(1.5deg);
            }
        }

        .iphone-frame {
            position: relative;
            width: 255px;
            height: 528px;
            background: linear-gradient(160deg, #3c3c3e 0%, #1c1c1e 40%, #2c2c2e 100%);
            border-radius: 44px;
            padding: 11px;
            flex-shrink: 0;
            box-shadow:
                /* outer metal ring */
                0 0 0 1px rgba(255, 255, 255, 0.18),
                0 0 0 2.5px rgba(80, 80, 80, 0.9),
                0 0 0 3.5px rgba(0, 0, 0, 0.95),
                /* depth shadow */
                0 35px 70px rgba(0, 0, 0, 0.75),
                /* golden glow */
                0 0 55px rgba(212, 175, 55, 0.18),
                /* inner highlight */
                inset 0 1px 2px rgba(255, 255, 255, 0.12),
                inset 0 -1px 2px rgba(0, 0, 0, 0.4);
        }

        @media (max-width: 480px) {
            .iphone-frame {
                transform: scale(0.85);
                margin: -40px 0;
            }
        }

        /* Side buttons */
        .iphone-frame::before {
            content: '';
            position: absolute;
            left: -3px;
            top: 90px;
            width: 3px;
            height: 28px;
            background: linear-gradient(to bottom, #4a4a4a, #2a2a2a);
            border-radius: 3px 0 0 3px;
            box-shadow: 0 40px 0 #3a3a3a, 0 78px 0 #3a3a3a;
        }

        .iphone-frame::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 115px;
            width: 3px;
            height: 54px;
            background: linear-gradient(to bottom, #4a4a4a, #2a2a2a);
            border-radius: 0 3px 3px 0;
        }

        .iphone-screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
            /* subtle inner shadow to give depth to screen bezel */
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .iphone-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            /* match screen border perfectly */
            border-radius: 35px;
        }

        /* Dynamic Island */
        .dynamic-island {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 34px;
            background: #000;
            border-radius: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .dynamic-island:hover {
            width: 200px;
            height: 42px;
        }

        .di-camera {
            width: 9px;
            height: 9px;
            background: radial-gradient(circle, #1a4a8a 0%, #0d2a50 100%);
            border-radius: 50%;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1), 0 0 6px rgba(30, 100, 200, 0.5);
        }

        .di-dot {
            width: 5px;
            height: 5px;
            background: #1a1a1a;
            border-radius: 50%;
            box-shadow: inset 0 0 3px rgba(255, 255, 255, 0.05);
        }

        /* Reflection overlay */
        .iphone-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.07) 0%,
                    transparent 35%,
                    transparent 65%,
                    rgba(255, 255, 255, 0.04) 100%);
            pointer-events: none;
            z-index: 5;
            border-radius: 35px;
        }

        /* Glow effect under phone */
        .iphone-glow {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 30px;
            background: radial-gradient(ellipse, rgba(212, 175, 55, 0.35) 0%, transparent 70%);
            filter: blur(10px);
        }

        /* Play/Mute button */
        .video-controls {
            position: absolute;
            bottom: 25px;
            right: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ctrl-btn {
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .ctrl-btn:hover {
            background: var(--accent-gold);
            color: #1a1d2b;
            transform: scale(1.15);
        }

        /* Status bar icons */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 10px 18px 0;
            z-index: 8;
            pointer-events: none;
        }

        .status-time {
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .status-icons {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-icons i {
            font-size: 0.6rem;
            color: white;
        }

        /* Decorative sparkles */
        .sparkle {
            position: absolute;
            border-radius: 50%;
            background: var(--accent-gold);
            animation: sparkleAnim 3s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes sparkleAnim {

            0%,
            100% {
                opacity: 0;
                transform: scale(0);
            }

            50% {
                opacity: 0.8;
                transform: scale(1);
            }
        }

        .itinerary-timeline {
            margin-top: 40px;
            position: relative;
        }

        .timeline-item {
            display: flex;
            gap: 25px;
            margin-bottom: 35px;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            right: 25px;
            top: 50px;
            bottom: -35px;
            width: 2px;
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.05));
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--accent-gold);
            flex-shrink: 0;
            z-index: 1;
            transition: 0.3s;
        }

        .timeline-item:hover .timeline-icon {
            background: var(--accent-gold);
            color: #1a1d2b;
            transform: translateY(-5px);
        }

        .timeline-info h4 {
            margin: 0 0 8px;
            font-size: 1.25rem;
            color: white;
            font-weight: 700;
        }

        .timeline-info p {
            margin: 0;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .booking-sidebar-card {
            background: rgba(255, 255, 255, 0.11);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            position: sticky;
            top: 40px;
            height: fit-content;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .price-label {
            font-size: 1.6rem;
            color: white;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .price-value {
            font-size: 3.5rem;
            color: var(--accent-gold);
            font-weight: 900;
            margin-bottom: 5px;
            font-family: 'Cairo', sans-serif;
        }

        .price-unit {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 35px;
        }

        .book-now-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent-yellow), #FFA000);
            color: #1a1d2b;
            padding: 18px 30px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.4rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            box-shadow: 0 10px 30px rgba(255, 184, 0, 0.3);
            border: none;
        }

        .book-now-btn:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 184, 0, 0.5);
        }

        .meta-list {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            text-align: right;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .meta-detail {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .meta-detail i {
            color: var(--accent-gold);
            width: 20px;
            text-align: center;
        }

        @media (max-width: 992px) {
            .main-content-grid {
                grid-template-columns: 1fr;
                margin-top: -30px;
            }

            .booking-sidebar-card {
                position: static;
                margin-bottom: 40px;
            }

            .hero-section {
                height: 40vh;
            }

            .phone-desc-row {
                flex-direction: column;
                align-items: center;
            }

            .phone-desc-right {
                width: 100%;
            }
        }
    </style>
</head>

        <nav class="details-nav">

                <i class="fas fa-arrow-right"></i>

            </div>

            <aside class="booking-sidebar">

                    <a href="#" class="book-now-btn" id="whatsapp-link" target="_blank">
                        <i class="fab fa-whatsapp"></i> احجز الآن

                    <div class="meta-list">
                        <div class="meta-detail">
                            <i class="fas fa-clock"></i>

                        <div class="meta-detail">
                            <i class="fas fa-user-friends"></i>

                        <div class="meta-detail">
                            <i class="fas fa-language"></i>
                            <span id="trip-lang">العربية والتركية</span>
                        </div>
                        <div class="meta-detail">
                            <i class="fas fa-shield-alt"></i>
                            <span>تأمين شامل للرحلة</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

        function getIconForTitle(title) {
            const lowTitle = title.toLowerCase();
            if (lowTitle.includes('انطلاق') || lowTitle.includes('عودة') || lowTitle.includes('مواصلات')) return 'fa-bus';
            if (lowTitle.includes('غداء') || lowTitle.includes('عشاء') || lowTitle.includes('طعام')) return 'fa-utensils';
            if (lowTitle.includes('جولة') || lowTitle.includes('زيارة') || lowTitle.includes('استكشاف')) return 'fa-camera';
            if (lowTitle.includes('جبل') || lowTitle.includes('طبيعة') || lowTitle.includes('شلال')) return 'fa-mountain';
            if (lowTitle.includes('تسوق') || lowTitle.includes('مول')) return 'fa-shopping-bag';
            if (lowTitle.includes('بحر') || lowTitle.includes('باخرة') || lowTitle.includes('قارب')) return 'fa-ship';
            if (lowTitle.includes('فندق') || lowTitle.includes('اقامة')) return 'fa-hotel';
            return 'fa-map-marker-alt';
        }

                            <p>${item.desc}</p>
                        </div>
                    `;
                    list.appendChild(div);
                });

                const includesSection = document.getElementById('trip-includes-section');
                if (data.included || data.excluded) {
                    includesSection.style.display = 'block';
                    const incList = document.getElementById('trip-included-list');
                    const excList = document.getElementById('trip-excluded-list');
                    incList.innerHTML = '';
                    excList.innerHTML = '';

                    if (data.included) {
                        data.included.forEach(item => {
                            incList.innerHTML += `<li style="margin-bottom: 10px; display: flex; gap: 10px;"><i class="fas fa-check" style="color: #4cd137; margin-top: 4px;"></i> <span>${item}</span></li>`;
                        });
                    }
                    if (data.excluded) {
                        data.excluded.forEach(item => {
                            excList.innerHTML += `<li style="margin-bottom: 10px; display: flex; gap: 10px;"><i class="fas fa-times" style="color: #e84118; margin-top: 4px;"></i> <span>${item}</span></li>`;
                        });
                    }
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        window.onload = initPage;
    </script>
</body>

</html>
